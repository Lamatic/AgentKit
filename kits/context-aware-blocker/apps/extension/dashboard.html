<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lamatic Context Blocker</title>
  
  <!-- Material Symbols for Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
  
  <link rel="stylesheet" href="dashboard.css">
</head>
<body class="bg-brand-bg min-h-screen font-sans text-brand-text p-8">
  
  <div class="max-w-md mx-auto pt-6 pb-20">
    
    <!-- Header -->
    <div class="flex items-center gap-3 mb-8 px-1">
      <img src="https://lamatic.ai/_next/image?url=%2Fpublic%2Flamatic-logo-dark.png&w=256&q=75" alt="Lamatic Logo" class="h-8 w-8 object-cover object-left">
      <h1 class="text-2xl font-bold tracking-wide">LamaBlock</h1>
    </div>

    <!-- Upcoming Blocks Card -->
    <div class="w-full bg-brand-card rounded-[32px] p-6 shadow-lg mb-8">
      <div class="flex justify-between items-start mb-1">
         <h2 class="text-2xl font-bold tracking-wide">Upcoming Blocks</h2>
         <span class="material-symbols-outlined text-brand-primary text-[20px]">security</span>
      </div>
      <p class="text-brand-textMuted text-[15px] mb-6">Start your focus session.</p>
      
      <button class="w-full bg-brand-primary hover:bg-brand-primaryHover transition-colors text-white rounded-pill px-6 py-4 flex justify-between items-center shadow-lg">
        <span class="font-bold text-[17px]">Deep Work</span>
        <span class="font-medium text-[15px] opacity-90">Starts in 0h 3m</span>
      </button>
    </div>

    <div class="flex justify-between items-center mb-6 px-1">
      <h2 class="text-2xl font-bold tracking-wide">Blocks</h2>
      <button class="bg-brand-card text-brand-text px-5 py-2 rounded-pill font-medium text-lg hover:bg-brand-cardHover transition-colors shadow-sm">
        + Add
      </button>
    </div>

    <!-- Container where we will inject the dummy cards -->
    <div id="cardsContainer" class="flex flex-col gap-4">
      <!-- Injected by JS -->
    </div>
  </div>

  <!-- Scripts -->
  <script src="components/commitCard.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
